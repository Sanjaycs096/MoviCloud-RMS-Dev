# -----------------------------------------------------------------------------
# Render Blueprint -- MOVICLOUD RMS  (2 services)
#
#   1. rms-backend   -- Unified Python backend  (Flask + FastAPI via Starlette)
#   2. rms-frontend  -- Unified React static site (User + Admin in one Vite build)
#
# After first deploy set in Render dashboard:
#   rms-backend  -> MONGODB_URI        = mongodb+srv://...
#   rms-frontend -> VITE_API_BASE_URL  = https://<rms-backend>.onrender.com
#   rms-frontend -> VITE_API_URL       = https://<rms-backend>.onrender.com/api/admin
# -----------------------------------------------------------------------------

services:

  # -- 1. Unified Backend -------------------------------------------------------
  - type: web
    name: rms-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGODB_URI
        sync: false
      - key: CORS_EXTRA_ORIGINS
        sync: false
      - key: FLASK_ENV
        value: production
      - key: API_PREFIX
        value: ""
    healthCheckPath: /api/admin/health
    autoDeploy: true

  # -- 2. Unified Frontend ------------------------------------------------------
  - type: web
    name: rms-frontend
    runtime: static
    rootDir: User_side
    buildCommand: npm install && npm install --prefix ../Admin_side/frontend && npm run build && npm install -g serve
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
